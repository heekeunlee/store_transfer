<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="권리금과 보증금 구분 및 총비용 계산 Q&A 기록장"
    />
    <title>권리금과 보증금 Q&A 기록장</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="topbar">

        <h1>권리금과 보증금 구분 및 총비용 계산</h1>

      <div class="actions">
        <button type="button" id="expandAll" aria-label="모든 질문 펼치기">+</button>
        <button type="button" id="collapseAll" aria-label="모든 질문 접기">-</button>

          href="https://g.co/gemini/share/9c9c66467689"
          target="_blank"
          rel="noopener"
          aria-label="Gemini 원문을 새 탭에서 열어 PDF로 저장"
          >원문</a
        >
        <button type="button" id="printPage" aria-label="기록장을 PDF 저장 또는 A4 인쇄">
          기록장 PDF
        </button>
      </div>
    </header>

    <main>
      <section class="summary" aria-labelledby="summary-title">
        <div>
          <h2 id="summary-title">기록 개요</h2>
          <p>
            Gemini 공유 대화 제목으로 확인된 주제인 권리금, 보증금, 점포 양수 비용
            계산을 Q&A 기록장 형식으로 정리했습니다.
          </p>
        </div>
        <dl>
          <div>
            <dt>출처</dt>
            <dd class="source-row">
              <a href="https://g.co/gemini/share/9c9c66467689">Gemini 공유 대화</a>
              <a
                class="inline-button"
                href="gemini_share_transcript.html"
                target="_blank"
                rel="noopener"
                >공유대화 원문 PDF 저장/인쇄</a
              >
              <a
                class="inline-button"
                href="full_conversation_transcript.html"
                target="_blank"
                rel="noopener"
                >현재 대화 전문 PDF</a
              >
            </dd>
          </div>
        </dl>
      </section>

      <section class="toc" aria-labelledby="toc-title">
        <h2 id="toc-title">질문 목록</h2>
        <ol id="tocList"></ol>
      </section>

      <section class="qa-list" id="qaList" aria-label="Q&A 기록"></section>
    </main>

    <footer>
      <p>정리일: 2026년 5월 20일 · GitHub Pages 배포용 정적 기록장</p>
    </footer>

    <script src="assets/app.js" type="module"></script>
