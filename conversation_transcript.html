<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Gemini Conversation Transcript</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; }
        .message { margin-bottom: 20px; padding: 15px; border-radius: 8px; }
        .user { background-color: #f0f4f8; border-left: 5px solid #2b6cb0; }
        .gemini { background-color: #f7fafc; border-left: 5px solid #4a5568; }
        .role { font-weight: bold; margin-bottom: 5px; display: block; }
        .content { white-space: pre-wrap; }
        @media print {
            .no-print { display: none; }
            body { margin: 0; padding: 0; }
            .message { page-break-inside: avoid; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>
    <div class="no-print" style="margin-bottom: 20px; text-align: right;">
        <button onclick="window.print()" style="padding: 10px 20px; cursor: pointer; background-color: #2b6cb0; color: white; border: none; border-radius: 5px;">PDF로 저장 / 인쇄하기</button>
    </div>
    <h1>Gemini 대화 기록</h1>
    <div class="message user">
        <span class="role">User</span>
        <div class="content">Gemini 공유 대화 이 대화의 풀 전문을 pdf 파일로 저장하고 인쇄 할수 있게 해줘</div>
    </div>
    <div class="message gemini">
        <span class="role">Gemini</span>
        <div class="content">대화 내용을 PDF로 저장하고 인쇄하실 수 있도록 HTML 문서를 생성해 드립니다. 이 파일을 브라우저에서 열어 '인쇄(Ctrl+P)' 기능을 사용해 PDF로 저장하실 수 있습니다.</div>
    </div>
</body>
</html>
